name: npm-publish

on:
  push:
    paths:
      - 'npm/**'
      - 'llm-lib/**'
      - 'plugins/**'
    branches:
      - main

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  release-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit-back версії + git-тег
      id-token: write # КРИТИЧНО для OIDC!

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun-deps

      - uses: actions/setup-node@v6
        with:
          node-version: '24' # includes npm@11.6.0
          registry-url: 'https://registry.npmjs.org'

      - name: Clear NODE_AUTH_TOKEN (щоб npm publish пішов через OIDC, а не порожній token)
        # setup-node з registry-url сам проставляє NODE_AUTH_TOKEN як job-env навіть без секрету;
        # це блокує trusted-publishing OIDC-обмін і призводить до помилки автентифікації на npm publish.
        run: echo "NODE_AUTH_TOKEN=" >> "$GITHUB_ENV"

      - name: Configure git identity + push auth
        # persist-credentials лишається false (ga-rule, безпека): checkout не зберігає токен.
        # Push release-коміту робимо окремим кроком нижче (лише якщо publish пройшов), тож
        # даємо job-scoped ephemeral GITHUB_TOKEN явно через remote-url заздалегідь.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Smoke-check CLI-модулів (ловить hoisting-регресії залежностей до релізу)
        run: node npm/scripts/smoke-check-imports.mjs

      - name: Release (bump + CHANGELOG + tag)
        # N_RULES_RELEASE_PUSH=0: bump/CHANGELOG/тег лишаються локальними в цьому checkout,
        # доки не підтвердиться хоч один успішний publish нижче — інакше git version
        # випереджає registry на кожній невдачі (саме так CI дійшов до 14.11.1 у git при
        # 14.10.4 на npm). `run` — канонічний текст кроку (npm-module.mdc template-policy),
        # тож push вимикається через env, а не зміну команди.
        run: bunx n-rules release
        env:
          N_RULES_RELEASE_PUSH: '0'

      # llm-lib публікується ПЕРШИМ: @7n/rules залежить від @7n/llm-lib,
      # тож інсталяція свіжого @7n/rules мусить знаходити пакет у registry.
      # continue-on-error: невдача одного з пакетів не має блокувати публікацію іншого.
      - name: Publish @7n/llm-lib
        id: publish-llm-lib
        continue-on-error: true
        uses: JS-DevTools/npm-publish@v4.1.5
        with:
          package: llm-lib/package.json

      - name: Publish package
        id: publish-cursor
        continue-on-error: true
        uses: JS-DevTools/npm-publish@v4.1.5
        with:
          package: npm/package.json

      # Плагіни публікуються ПІСЛЯ ядра: peerDependency спрямована на @7n/rules,
      # тож інсталяція свіжого плагіна мусить знаходити сумісне ядро в registry.
      - name: Publish @7n/rules-ci-github
        id: publish-ci-github
        continue-on-error: true
        uses: JS-DevTools/npm-publish@v4.1.5
        with:
          package: plugins/ci-github/package.json

      - name: Publish @7n/rules-ci-azure
        id: publish-ci-azure
        continue-on-error: true
        uses: JS-DevTools/npm-publish@v4.1.5
        with:
          package: plugins/ci-azure/package.json

      - name: Publish @7n/rules-lang-python
        id: publish-lang-python
        continue-on-error: true
        uses: JS-DevTools/npm-publish@v4.1.5
        with:
          package: plugins/lang-python/package.json

      - name: Publish @7n/rules-lang-rust
        id: publish-lang-rust
        continue-on-error: true
        uses: JS-DevTools/npm-publish@v4.1.5
        with:
          package: plugins/lang-rust/package.json

      - name: Push release-коміт + теги (лише якщо бодай один publish пройшов)
        if: steps.publish-llm-lib.outcome == 'success' || steps.publish-cursor.outcome == 'success' || steps.publish-ci-github.outcome == 'success' || steps.publish-ci-azure.outcome == 'success' || steps.publish-lang-python.outcome == 'success' || steps.publish-lang-rust.outcome == 'success'
        run: git push --follow-tags

      - name: Fail job, якщо публікація хоч одного пакета впала
        if: steps.publish-llm-lib.outcome == 'failure' || steps.publish-cursor.outcome == 'failure' || steps.publish-ci-github.outcome == 'failure' || steps.publish-ci-azure.outcome == 'failure' || steps.publish-lang-python.outcome == 'failure' || steps.publish-lang-rust.outcome == 'failure'
        run: |
          echo "::error::npm publish не пройшов — llm-lib=${{ steps.publish-llm-lib.outcome }}, cursor=${{ steps.publish-cursor.outcome }}, ci-github=${{ steps.publish-ci-github.outcome }}, ci-azure=${{ steps.publish-ci-azure.outcome }}, lang-python=${{ steps.publish-lang-python.outcome }}, lang-rust=${{ steps.publish-lang-rust.outcome }}"
          exit 1

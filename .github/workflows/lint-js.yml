name: Lint JS

on:
  push:
    branches:
      - dev
      - main
    paths:
      - '**/*.js'
      - '**/*.mjs'
      - '**/*.cjs'
      - '**/*.jsx'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.vue'
      - '**/eslint.config.*'
      - '**/.oxlintrc.json'
  pull_request:
    branches:
      - dev
      - main

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  eslint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-bun-deps

      - name: Eslint
        run: bunx n-rules lint js --no-fix
        env:
          # ensure-tool: авторизований lookup GitHub Releases (per-IP rate-limit на shared-runner-ах)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

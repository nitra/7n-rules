name: Lint Python

on:
  push:
    branches:
      - dev
      - main
    paths:
      - '**/*.py'
      - '.github/workflows/lint-python.yml'

  pull_request:
    branches:
      - dev
      - main

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-bun-deps

      - uses: astral-sh/setup-uv@v8.0.0

      # Репо без pyproject/uv.lock (python-фікстури без пакета) — uv sync скіпається
      - name: Install dependencies (uv)
        if: ${{ hashFiles('uv.lock') != '' }}
        run: uv sync --frozen

      - name: Lint Python
        run: bunx n-rules lint python --no-fix
        env:
          # ensure-tool: авторизований lookup GitHub Releases (per-IP rate-limit на shared-runner-ах)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
